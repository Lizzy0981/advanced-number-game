name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run format:check

  # ── 2. i18n Validation ──────────────────────────────────────────────────────
  i18n:
    name: Validate 11 Languages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Validate all translations
        run: node scripts/validate-i18n.js
      - name: Generate coverage report
        run: node scripts/i18n-report.js
      - uses: actions/upload-artifact@v4
        with:
          name: i18n-report
          path: reports/i18n-coverage.json
          retention-days: 30

  # ── 3. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run test:ci
      - uses: codecov/codecov-action@v4
        with: { directory: coverage/, fail_ci_if_error: false }

  # ── 4. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: [lint, i18n, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Generate version.json
        run: node scripts/generate-version.js
      - name: Build for GitHub Pages
        run: npm run build:github
      - name: Check bundle size
        run: node scripts/check-bundle-size.js
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs }

  # ── 5. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
